# E-Commerce Data Warehouse dbt Project
# 电商数仓 dbt 项目

name: ecommerce_warehouse
profile: ecommerce_warehouse
version: "1.0.0"
require-dbt-version: [">=1.5.0", "<2.0.0"]

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ecommerce_warehouse:
    staging:
      +materialized: view
      +schema: staging
    dwd:
      +materialized: table
      +schema: dwd
    dws:
      +materialized: table
      +schema: dws
    ads:
      +materialized: table
      +schema: ads